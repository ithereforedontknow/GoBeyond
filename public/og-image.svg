<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Dot grid -->
  <defs>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(204,234,74,0.12)"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Lime glow blob -->
  <defs>
    <radialGradient id="glow" cx="75%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ccea4a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ccea4a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo mark -->
  <rect x="80" y="80" width="52" height="52" rx="12" fill="#ccea4a"/>
  <!-- Flame shape approximation -->
  <path d="M106 98 C106 98 118 108 114 118 C114 118 120 112 118 104 C118 104 124 112 120 122 C116 130 106 132 106 132 C106 132 92 130 90 120 C88 112 96 106 96 106 C96 106 100 114 104 112 C102 108 106 98 106 98Z" fill="#0a0a0a"/>

  <!-- Wordmark -->
  <text x="148" y="118" font-family="Arial Black, Arial, sans-serif" font-size="36" font-weight="900" letter-spacing="-1" fill="#f7f7f7">Go<tspan fill="#ccea4a">Beyond</tspan></text>

  <!-- Divider -->
  <rect x="80" y="172" width="48" height="3" rx="2" fill="#ccea4a"/>

  <!-- Tagline -->
  <text x="80" y="240" font-family="Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="-2" fill="#f7f7f7">Go Further. Go Smarter.</text>
  <text x="80" y="310" font-family="Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="-2" fill="#ccea4a">Go Beyond.</text>

  <!-- Description -->
  <text x="80" y="390" font-family="Arial, sans-serif" font-size="22" fill="#888888">Digital Solutions · Systems &amp; Web Development · Building Plans</text>

  <!-- Bottom rule -->
  <rect x="80" y="530" width="1040" height="1" fill="rgba(255,255,255,0.08)"/>

  <!-- Bottom left — contact -->
  <text x="80" y="572" font-family="Arial, sans-serif" font-size="16" fill="#555555">itsolutionsgobeyond@gmail.com</text>

  <!-- Bottom right — URL -->
  <text x="1120" y="572" font-family="Arial, sans-serif" font-size="16" fill="#555555" text-anchor="end">go-beyond.net</text>
</svg>
